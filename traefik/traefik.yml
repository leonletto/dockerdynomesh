# Traefik static config for dockerdynomesh.
# Dynamic routers/services come from the `file` provider, written by
# the discoverer. cert.yml in the same directory registers the
# certgen-issued wildcard cert as the default.
#
# No entrypoint-level HTTP→HTTPS redirect: port 80 is intentionally
# usable for the setup.<machine>.<tailnet>.ts.net welcome page (HTTP
# only — that's where users go before they trust our root CA). Service
# routers attach to entrypoint `websecure` only; the setup router (in
# /shared/dynamic/setup.yml, written by bootstrap.sh) attaches to
# entrypoint `web` only. Port 80 returns 404 for any hostname that
# isn't the setup hostname, which is correct.

api:
  dashboard: false
  insecure: false

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"

providers:
  file:
    directory: /shared/dynamic
    watch: true
  docker:
    # Reuses the same read-only socket-proxy the discoverer uses; no
    # docker socket is bound into the Traefik container itself.
    endpoint: tcp://socket-proxy:2375
    # Only containers that opt in via `traefik.enable=true` are routed.
    # The discoverer continues to handle bare containers via the file
    # provider; it skips any container with a traefik.* label, so the
    # two providers stay in their own lanes by construction.
    exposedByDefault: false
    # Default network the docker provider uses to pick a container IP.
    # Containers can override per-router with traefik.docker.network=...
    network: dynomesh-net
    watch: true

log:
  level: INFO
