# TLS options shipped with dockerdynomesh.
# default: modest baseline (TLS 1.2 minimum, sniStrict false so dev
#   tooling that probes without SNI still works).
# cloudflare: alias for projects whose cloud config references
#   "cloudflare@file". We provide a modern-cipher posture under the
#   same name so labels copy over unchanged. Projects that prefer the
#   env-var approach can use tls.options=${TLS_OPTIONS:-default@file}
#   instead — see docs/adding-to-projects.md.
tls:
  options:
    default:
      minVersion: VersionTLS12
      sniStrict: false
    cloudflare:
      minVersion: VersionTLS12
      cipherSuites:
        - TLS_AES_128_GCM_SHA256
        - TLS_AES_256_GCM_SHA384
        - TLS_CHACHA20_POLY1305_SHA256
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
